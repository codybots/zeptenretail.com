<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zepten Retail</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Sora:wght@600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #FAFAF8;
    --text: #111110;
    --muted: #888883;
    --border: #E8E8E4;
    --accent: #1B4FD8;
  }

  body {
    font-family: "Inter", sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(250,250,248,0.93);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    height: 68px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .nav-brand img {
    height: 48px;
    width: auto;
    display: block;
  }

  .nav-link {
    font-size: 13px;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }

  .nav-link:hover { color: var(--text); }

  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 110px 24px 80px;
    min-height: 100vh;
  }

  .eyebrow {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 24px;
  }

  .hero-title {
    font-family: "Sora", sans-serif;
    font-size: clamp(36px, 6vw, 68px);
    font-weight: 700;
    letter-spacing: -1.5px;
    line-height: 1.08;
    max-width: 700px;
    margin-bottom: 24px;
    color: var(--text);
  }

  .hero-title .thin {
    font-weight: 300;
    font-family: "Inter", sans-serif;
    letter-spacing: -0.5px;
  }

  .hero-sub {
    font-size: 16px;
    color: var(--muted);
    max-width: 400px;
    line-height: 1.65;
    margin-bottom: 52px;
    font-weight: 400;
  }

  .marketplace-label {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 28px;
  }

  .marketplace-strip {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* Each logo sits in a fixed-width cell, centered, so all appear same visual weight */
  .mp-item {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 130px;
    height: 48px;
    opacity: 0.5;
    filter: grayscale(20%);
    transition: opacity 0.25s ease, filter 0.25s ease;
    text-decoration: none;
  }

  .mp-item:hover {
    opacity: 1;
    filter: grayscale(0%);
  }

  .mp-item img {
    max-width: 120px;
    max-height: 36px;
    width: auto;
    height: auto;
    display: block;
    object-fit: contain;
  }

  .divider {
    width: 1px;
    height: 28px;
    background: var(--border);
    flex-shrink: 0;
  }

  footer {
    border-top: 1px solid var(--border);
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
  }

  footer a {
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }

  footer a:hover { color: var(--text); }

  @media (max-width: 600px) {
    nav { padding: 0 20px; }
    footer { padding: 20px; flex-direction: column; gap: 8px; text-align: center; }
    .marketplace-strip { gap: 8px; }
    .mp-item { width: 100px; }
    .mp-item img { max-width: 90px; }
  }
</style>
</head>
